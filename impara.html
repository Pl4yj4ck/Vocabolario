<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Vocaboli App</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#6750A4">
    <link rel="apple-touch-icon" href="icona.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Outlined" rel="stylesheet">
    
    <style>
        :root {
            --md-sys-color-primary: #6750A4;
            --md-sys-color-surface: #FEF7FF;
            --md-sys-color-secondary-container: rgba(103, 80, 164, 0.15);
            --md-sys-color-surface-container: rgba(0, 0, 0, 0.05);
            --md-sys-color-outline: #79747E;
            --md-sys-color-error: #B3261E;
        }

        body {
            font-family: 'Roboto', sans-serif;
            background-color: var(--md-sys-color-surface);
            margin: 0; display: flex; justify-content: center;
            min-height: 100vh; color: #1D1B20;
            overflow-x: hidden;
        }

        .phone-container { width: 100%; max-width: 480px; display: flex; flex-direction: column; }
        .page { display: none; flex-direction: column; padding: 20px; animation: fadeIn 0.2s ease-out; box-sizing: border-box; }
        .page.active { display: flex; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .top-bar { display: flex; align-items: center; justify-content: space-between; padding: 10px 0; }

        .category-container { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 24px; }
        .cat-chip {
            padding: 8px 16px; border-radius: 8px; border: 1px solid var(--md-sys-color-outline);
            cursor: pointer; font-size: 14px; font-weight: 500; display: flex; align-items: center; gap: 4px;
            transition: all 0.2s;
        }
        .cat-chip.selected { background: var(--md-sys-color-secondary-container); border-color: var(--md-sys-color-primary); color: var(--md-sys-color-primary); }
        .cat-chip.auto-loaded { border-style: dashed; border-width: 2px; }

        .m3-card { background: var(--md-sys-color-surface-container); border-radius: 28px; padding: 24px; margin-bottom: 16px; text-align: center; }
        .btn-large {
            background: var(--md-sys-color-secondary-container); border: none; padding: 18px;
            border-radius: 20px; margin-bottom: 12px; font-size: 16px; font-weight: 500;
            cursor: pointer; display: flex; align-items: center; gap: 16px; width: 100%;
            color: var(--md-sys-color-primary);
        }
        .btn-fab { background: var(--md-sys-color-primary); color: white; border: none; width: 44px; height: 44px; border-radius: 14px; cursor: pointer; display: flex; align-items: center; justify-content: center; }

        .matching-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .chip { background: white; border: 1px solid var(--md-sys-color-outline); border-radius: 16px; padding: 12px 6px; text-align: center; font-size: 13px; font-weight: 500; cursor: pointer; min-height: 44px; display: flex; align-items: center; justify-content: center; }
        .chip.selected { background: var(--md-sys-color-secondary-container); border-color: var(--md-sys-color-primary); }
        .chip.correct { opacity: 0; pointer-events: none; }
        .chip.wrong { background: #F9DEDC; border-color: var(--md-sys-color-error); }
        .typing-input { width: 100%; border: none; border-bottom: 2px solid var(--md-sys-color-primary); background: transparent; font-size: 24px; padding: 12px 0; outline: none; text-align: center; box-sizing: border-box; }
        .quiz-option { background: white; border: 1px solid var(--md-sys-color-outline); border-radius: 16px; padding: 16px; margin-bottom: 10px; cursor: pointer; }
        .quiz-option.correct { background: #C8E6C9; }
        .quiz-option.wrong { background: #FFCDD2; }
        .settings-item { display: flex; align-items: center; justify-content: space-between; padding: 16px; background: var(--md-sys-color-surface-container); border-radius: 16px; margin-bottom: 12px; }
        .color-preview { width: 40px; height: 40px; border-radius: 50%; border: 2px solid white; cursor: pointer; overflow: hidden; }
        input[type="color"] { border: none; width: 100%; height: 100%; transform: scale(2); cursor: pointer; }
    </style>
</head>
<body>

<div class="phone-container">
    
    <section id="page-home" class="page active">
        <div class="top-bar">
            <h1 style="font-size: 28px; margin: 0;">Vocaboli</h1>
            <button class="btn-fab" onclick="navigateTo('page-settings')" style="background: transparent; color: var(--md-sys-color-primary)">
                <span class="material-icons-outlined">settings</span>
            </button>
        </div>
        
        <p style="color: var(--md-sys-color-outline); font-size: 13px; margin-bottom: 8px;">Categorie disponibili:</p>
        <div id="category-chips" class="category-container"></div>

        <div id="game-buttons" style="opacity: 0.5; pointer-events: none;">
            <button class="btn-large" onclick="initMatching()"><span class="material-icons-outlined">extension</span> Matching</button>
            <button class="btn-large" onclick="initTyping()"><span class="material-icons-outlined">edit</span> Scrittura</button>
            <button class="btn-large" onclick="initScramble()"><span class="material-icons-outlined">reorder</span> Anagramma</button>
            <button class="btn-large" onclick="initQuiz()"><span class="material-icons-outlined">quiz</span> Scelta Multipla</button>
            <button class="btn-large" onclick="initFlashcards()"><span class="material-icons-outlined">style</span> Flashcards</button>
        </div>
        <p id="status-text" style="text-align: center; font-size: 12px; color: var(--md-sys-color-outline); margin-top: 10px;"></p>
    </section>

    <section id="page-settings" class="page">
        <div class="top-bar">
            <button class="btn-fab" onclick="navigateTo('page-home')"><span class="material-icons-outlined">arrow_back</span></button>
            <h2 style="margin: 0; font-size: 20px;">Impostazioni</h2>
            <div style="width:44px"></div>
        </div>

        <h3 style="font-size: 14px; text-transform: uppercase; color: var(--md-sys-color-outline); margin-top: 24px;">Aspetto</h3>
        <div class="settings-item"><span>Colore Primario</span><div class="color-preview"><input type="color" id="color-primary" onchange="updateColors()"></div></div>
        <div class="settings-item"><span>Sfondo</span><div class="color-preview"><input type="color" id="color-surface" onchange="updateColors()"></div></div>

        <h3 style="font-size: 14px; text-transform: uppercase; color: var(--md-sys-color-outline); margin-top: 24px;">Dati extra (Manuali)</h3>
        <div class="m3-card" style="text-align: left; padding: 16px;">
            <input type="file" id="csv-upload" accept=".csv" style="display: none;" onchange="handleFileUpload(this)">
            <button class="btn-large" onclick="document.getElementById('csv-upload').click()" style="margin:0"><span class="material-icons-outlined">upload</span> Carica altro CSV</button>
        </div>
        
        <button class="btn-large" onclick="resetAll()" style="background: #F9DEDC; color: #B3261E; margin-top: 20px;">
            <span class="material-icons-outlined">delete_forever</span> Resetta memoria cache
        </button>
    </section>

    <section id="game-view" class="page">
        <div class="top-bar">
            <button class="btn-fab" onclick="navigateTo('page-home')"><span class="material-icons-outlined">arrow_back</span></button>
            <h2 id="game-title" style="margin: 0; font-size: 18px;">---</h2>
            <div style="width:44px"></div>
        </div>
        <div id="game-content" style="margin-top: 20px;"></div>
        <div id="game-feedback" style="text-align: center; margin-top: 20px; font-weight: 500; min-height: 24px;"></div>
    </section>
</div>

<script>
    // Configurazione file automatici
    const AUTO_FILES = ["house.csv", "food.csv", "chores.csv"];
    const FOLDER_PATH = "./file/";

    let db = {}; 
    let selectedCats = [];
    let activeVocab = [];
    let currentItem = null;
    let selectedChip = null;

    // Registrazione Service Worker per PWA
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('sw.js').catch(err => console.log('SW error', err));
        });
    }

    window.onload = async () => {
        loadSettings();
        const saved = localStorage.getItem('vocab_db');
        if (saved) db = JSON.parse(saved);
        await loadFolderFiles();
        renderCategories();
    };

    async function loadFolderFiles() {
        for (const fileName of AUTO_FILES) {
            try {
                const response = await fetch(FOLDER_PATH + fileName);
                if (!response.ok) continue;
                const text = await response.text();
                const catName = fileName.replace('.csv', '').toUpperCase();
                db[catName] = parseCSVText(text);
            } catch (e) {
                console.warn("Impossibile caricare:", fileName);
            }
        }
    }

    function parseCSVText(text) {
        return text.split('\n')
            .filter(l => l.includes(',') || l.includes(';'))
            .map(l => {
                const p = l.split(/[;,]/);
                return { ita: p[0].trim(), eng: p[1].trim() };
            });
    }

    function renderCategories() {
        const container = document.getElementById('category-chips');
        container.innerHTML = '';
        const keys = Object.keys(db);
        if (keys.length === 0) {
            container.innerHTML = '<p style="font-size:12px; opacity:0.6">Nessun file trovato.</p>';
        }
        keys.forEach(cat => {
            const isAuto = AUTO_FILES.some(f => f.toUpperCase().includes(cat));
            const chip = document.createElement('div');
            chip.className = `cat-chip ${selectedCats.includes(cat) ? 'selected' : ''} ${isAuto ? 'auto-loaded' : ''}`;
            chip.innerHTML = `<span class="material-icons-outlined" style="font-size:16px">${selectedCats.includes(cat) ? 'check_circle' : (isAuto ? 'folder_open' : 'circle')}</span> ${cat}`;
            chip.onclick = () => toggleCategory(cat);
            container.appendChild(chip);
        });
        updateActiveVocab();
    }

    function toggleCategory(cat) {
        if (selectedCats.includes(cat)) {
            selectedCats = selectedCats.filter(c => c !== cat);
        } else {
            selectedCats.push(cat);
        }
        renderCategories();
    }

    function updateActiveVocab() {
        activeVocab = [];
        selectedCats.forEach(cat => activeVocab = [...activeVocab, ...db[cat]]);
        const ready = activeVocab.length > 0;
        document.getElementById('game-buttons').style.opacity = ready ? "1" : "0.5";
        document.getElementById('game-buttons').style.pointerEvents = ready ? "auto" : "none";
        document.getElementById('status-text').innerText = ready ? `${activeVocab.length} parole selezionate.` : "Seleziona una categoria.";
    }

    function navigateTo(id) { 
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active')); 
        document.getElementById(id).classList.add('active'); 
    }

    function setupGame(title) { 
        navigateTo('game-view'); 
        document.getElementById('game-title').innerText = title; 
        document.getElementById('game-feedback').innerText = ''; 
        return document.getElementById('game-content'); 
    }

    function initMatching() {
        const container = setupGame("Matching");
        const grid = document.createElement('div'); grid.className = 'matching-grid';
        container.innerHTML = ''; container.appendChild(grid);
        const subset = [...activeVocab].sort(() => 0.5 - Math.random()).slice(0, 6);
        let pool = []; subset.forEach(w => { pool.push({ t: w.ita, m: w.eng }, { t: w.eng, m: w.ita }); });
        pool.sort(() => 0.5 - Math.random());
        pool.forEach(item => {
            const div = document.createElement('div'); div.className = 'chip'; div.innerText = item.t;
            div.onclick = () => {
                if(div.classList.contains('correct') || div === selectedChip?.el) return;
                div.classList.add('selected');
                if(!selectedChip) { selectedChip = { el: div, m: item.m }; }
                else {
                    if(selectedChip.m === item.t) { div.classList.add('correct'); selectedChip.el.classList.add('correct'); selectedChip = null; if(document.querySelectorAll('.chip:not(.correct)').length === 0) setTimeout(initMatching, 1000); }
                    else { div.classList.add('wrong'); selectedChip.el.classList.add('wrong'); setTimeout(() => { div.classList.remove('wrong', 'selected'); selectedChip.el.classList.remove('wrong', 'selected'); selectedChip = null; }, 400); }
                }
            };
            grid.appendChild(div);
        });
    }

    function initTyping() {
        const container = setupGame("Scrittura");
        currentItem = activeVocab[Math.floor(Math.random() * activeVocab.length)];
        container.innerHTML = `<div class="m3-card"><h2>${currentItem.ita}</h2></div><input type="text" id="t-inp" class="typing-input" placeholder="Traduci..." autocomplete="off">`;
        const inp = document.getElementById('t-inp'); inp.focus();
        inp.onkeypress = (e) => { if(e.key === 'Enter') { const win = inp.value.trim().toLowerCase() === currentItem.eng.toLowerCase(); document.getElementById('game-feedback').innerText = win ? "Corretto!" : `Sbagliato: ${currentItem.eng}`; setTimeout(initTyping, win ? 800 : 2000); } };
    }

    function initScramble() {
        const container = setupGame("Anagramma");
        currentItem = activeVocab[Math.floor(Math.random() * activeVocab.length)];
        let letters = currentItem.eng.split('').sort(() => 0.5 - Math.random()).join(' ');
        container.innerHTML = `<div class="m3-card"><h2>${currentItem.ita}</h2><p style="letter-spacing:4px; font-weight:700">${letters}</p></div><input type="text" id="s-inp" class="typing-input" placeholder="Ricomponi..." autocomplete="off">`;
        const inp = document.getElementById('s-inp'); inp.focus();
        inp.onkeypress = (e) => { if(e.key === 'Enter') { if(inp.value.trim().toLowerCase() === currentItem.eng.toLowerCase()) { document.getElementById('game-feedback').innerText = "Ottimo!"; setTimeout(initScramble, 800); } else { document.getElementById('game-feedback').innerText = "Riprova!"; } } };
    }

    function initQuiz() {
        const container = setupGame("Scelta Multipla");
        currentItem = activeVocab[Math.floor(Math.random() * activeVocab.length)];
        let options = [currentItem.eng];
        while(options.length < 4 && options.length < activeVocab.length) { let r = activeVocab[Math.floor(Math.random()*activeVocab.length)].eng; if(!options.includes(r)) options.push(r); }
        options.sort(() => 0.5 - Math.random());
        container.innerHTML = `<div class="m3-card"><h3>${currentItem.ita}</h3></div><div id="opt-list"></div>`;
        options.forEach(opt => {
            const b = document.createElement('div'); b.className = 'quiz-option'; b.innerText = opt;
            b.onclick = () => { const isCorrect = opt === currentItem.eng; b.classList.add(isCorrect ? 'correct' : 'wrong'); document.getElementById('game-feedback').innerText = isCorrect ? "Giusto!" : `Era: ${currentItem.eng}`; setTimeout(initQuiz, isCorrect ? 800 : 2000); };
            document.getElementById('opt-list').appendChild(b);
        });
    }

    function initFlashcards() {
        const container = setupGame("Flashcards");
        currentItem = activeVocab[Math.floor(Math.random() * activeVocab.length)];
        container.innerHTML = `<div style="perspective: 1000px; height: 200px; margin: 20px 0;" onclick="this.children[0].style.transform = this.children[0].style.transform === 'rotateY(180deg)' ? 'rotateY(0deg)' : 'rotateY(180deg)'"><div style="position: relative; width: 100%; height: 100%; transition: transform 0.6s; transform-style: preserve-3d; cursor: pointer;"><div style="position: absolute; width: 100%; height: 100%; backface-visibility: hidden; display: flex; flex-direction: column; align-items: center; justify-content: center; border-radius: 28px; background: var(--md-sys-color-surface-container);"><h1>${currentItem.ita}</h1><p>Tocca per girare</p></div><div style="position: absolute; width: 100%; height: 100%; backface-visibility: hidden; display: flex; align-items: center; justify-content: center; border-radius: 28px; background: var(--md-sys-color-secondary-container); transform: rotateY(180deg);"><h1>${currentItem.eng}</h1></div></div></div><button class="btn-large" style="background:var(--md-sys-color-primary); color:white; justify-content:center" onclick="initFlashcards()">Prossima carta</button>`;
    }

    function handleFileUpload(input) {
        const file = input.files[0]; if (!file) return;
        const reader = new FileReader();
        reader.onload = (e) => {
            const catName = file.name.replace('.csv', '').toUpperCase();
            db[catName] = parseCSVText(e.target.result);
            localStorage.setItem('vocab_db', JSON.stringify(db));
            renderCategories();
        };
        reader.readAsText(file);
    }

    function updateColors() { 
        const p = document.getElementById('color-primary').value; 
        const s = document.getElementById('color-surface').value; 
        document.documentElement.style.setProperty('--md-sys-color-primary', p); 
        document.documentElement.style.setProperty('--md-sys-color-surface', s); 
        localStorage.setItem('theme_primary', p); 
        localStorage.setItem('theme_surface', s); 
    }

    function loadSettings() { 
        const p = localStorage.getItem('theme_primary') || '#6750A4'; 
        const s = localStorage.getItem('theme_surface') || '#FEF7FF'; 
        document.getElementById('color-primary').value = p; 
        document.getElementById('color-surface').value = s; 
        document.documentElement.style.setProperty('--md-sys-color-primary', p); 
        document.documentElement.style.setProperty('--md-sys-color-surface', s); 
    }

    function resetAll() { if(confirm("Resettare cache?")) { localStorage.clear(); location.reload(); } }
</script>
</body>
</html>
